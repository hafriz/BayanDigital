###############################################################################
# BayanDigital – Docker Compose (Raspberry Pi / local deployment)
# Services: app (PHP-FPM+Nginx), MariaDB 11.4, Redis 7
###############################################################################
services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_DATABASE:-bayandigital}
      MYSQL_USER: ${DB_USERNAME:-bayandigital}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-7575}:80"
    environment:
      APP_NAME: "Masjid Smart Screen"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:7575}
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-bayandigital}
      DB_USERNAME: ${DB_USERNAME:-bayandigital}
      DB_PASSWORD: ${DB_PASS}
      DB_PASS: ${DB_PASS}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: rarecreation.xyz@gmail.com
      MAIL_PASSWORD: puayfgrgavndwmdx
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: rarecreation.xyz@gmail.com
      MAIL_FROM_NAME: "Masjid Smart Screen"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bayandigital.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      GOOGLE_DRIVE_REDIRECT_URI: https://bayandigital.rarecreation.xyz/admin/backups/connect
      GOOGLE_DRIVE_FOLDER_NAME: "BayanDigital Backups"
      BACKUP_SCHEDULE_ENABLED: "true"
      BACKUP_SCHEDULE_FREQUENCY: daily
      BACKUP_SCHEDULE_TIME: "03:00"
      BACKUP_KEEP_DAYS: "30"
      SETTINGS_CACHE: ""
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache

volumes:
  mariadb-data:
  app-storage:
  app-cache:
