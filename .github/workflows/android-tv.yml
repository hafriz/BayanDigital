name: Android TV CI

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-tv.yml'
      - 'ci/update-android-metadata.sh'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tv.yml'
      - 'ci/update-android-metadata.sh'

permissions:
  contents: read

concurrency:
  group: android-tv-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masjid-smart-screen-tv-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  release-apk:
    name: Publish rolling APK release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: masjid-smart-screen-tv-debug
          path: build/android-apk

      - name: Publish latest Android TV release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          install -D -m 0644 \
            build/android-apk/app-debug.apk \
            build/release/masjid-smart-screen-tv.apk
          if gh release view android-tv-latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload android-tv-latest \
              'build/release/masjid-smart-screen-tv.apk#bayanDigital Android TV APK' \
              --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create android-tv-latest \
              'build/release/masjid-smart-screen-tv.apk#bayanDigital Android TV APK' \
              --title 'bayanDigital Android TV — Latest' \
              --notes 'Automatically built Android TV development release.' \
              --latest=false --repo "${GITHUB_REPOSITORY}"
          fi

  publish-apk:
    name: Publish APK and deploy Kubernetes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-apk, release-apk]
    runs-on: self-hosted
    environment: production
    timeout-minutes: 30
    env:
      REGISTRY: harbor.development.rarecreation.xyz
      IMAGE_REPOSITORY: bayandigital/app
      KUBE_NAMESPACE: bayandigital
      KUBE_DEPLOYMENT: bayandigital

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: masjid-smart-screen-tv-debug
          path: build/android-apk

      - name: Install APK into the web application
        shell: bash
        run: |
          set -euo pipefail
          install -D -m 0644 \
            build/android-apk/app-debug.apk \
            backend/public/android/masjid-smart-screen-tv.apk
          test -s backend/public/android/masjid-smart-screen-tv.apk

      - name: Synchronize Android release metadata
        shell: bash
        run: bash ci/update-android-metadata.sh

      - name: Bundle current JAKIM prayer times
        shell: bash
        run: bash ci/fetch-prayer-times.sh

      - name: Verify local deployment prerequisites
        shell: bash
        run: |
          set -euo pipefail
          command -v docker >/dev/null
          command -v kubectl >/dev/null
          docker info >/dev/null
          test "$(kubectl auth can-i patch deployments.apps -n "${KUBE_NAMESPACE}")" = 'yes'
          test "$(kubectl auth can-i get pods -n "${KUBE_NAMESPACE}")" = 'yes'

      - name: Build and push application image with APK
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_REPOSITORY}"
          tag="${GITHUB_SHA}-android"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --tag "${image}:${tag}" \
            --tag "${image}:latest" \
            --file docker/Dockerfile .
          docker push "${image}:${tag}"
          docker push "${image}:latest"

      - name: Deploy and verify APK release
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_REPOSITORY}:${GITHUB_SHA}-android"
          kubectl set image "deployment/${KUBE_DEPLOYMENT}" \
            "app=${image}" -n "${KUBE_NAMESPACE}"
          kubectl rollout status "deployment/${KUBE_DEPLOYMENT}" \
            -n "${KUBE_NAMESPACE}" --timeout=5m
          kubectl get "deployment/${KUBE_DEPLOYMENT}" \
            -n "${KUBE_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="app")].image}' \
            | grep -Fx "${image}"
