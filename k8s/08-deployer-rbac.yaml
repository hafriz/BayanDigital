# Apply this once with a Kubernetes administrator identity. The GitHub Actions
# runner itself intentionally does not receive permission to modify RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bayandigital-deployer
  namespace: bayandigital
rules:
  - apiGroups: [""]
    resources: ["configmaps", "services"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "create", "update", "patch", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bayandigital-deployer
  namespace: bayandigital
subjects:
  - kind: ServiceAccount
    name: hafriz-deployer
    namespace: development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bayandigital-deployer
